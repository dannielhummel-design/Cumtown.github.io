<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: black;
      scroll-snap-type: y mandatory;
      overflow-y: scroll;
      font-family: Arial;
    }

    header {
      position: fixed;
      top: 15px;
      width: 100%;
      text-align: center;
      color: white;
      font-size: 20px;
      z-index: 10;
      pointer-events: none;
    }

    .photo {
      height: 100vh;
      width: 100%;
      scroll-snap-align: start;
    }

    .photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>

<body>

  <header>Welcome to My Photo Gallery</header>

  <div class="photo"><img src="IMG_0129.jpeg"></div>
  <div class="photo"><img src="IMG_0133.jpeg"></div>
  <div class="photo"><img src="IMG_0132.jpeg"></div>
  <div class="photo"><img src="IMG_0131.jpeg"></div>
  <div class="photo"><img src="IMG_0130.jpeg"></div>

</body>
</html>
